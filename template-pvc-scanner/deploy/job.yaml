apiVersion: batch/v1
kind: Job
metadata:
  name: template-pvc-scanner
  namespace: template-pvc-scanner
  labels:
    app.kubernetes.io/name: template-pvc-scanner
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: template-pvc-scanner
    spec:
      restartPolicy: Never
      serviceAccountName: template-pvc-scanner
      containers:
        - name: scanner
          image: registry.example.com/template-pvc-scanner:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ceu
            - |
              scanner_bin="${SCANNER_BIN:-/template-pvc-scanner}"
              output_file="${OUTPUT_FILE:-/scan-output/pvc-scan.csv}"

              case "${output_file}" in
                */*) mkdir -p "${output_file%/*}" ;;
              esac
              set -- --instance "${TEMPLATE_INSTANCE}" ${SCANNER_ARGS:-} --output csv
              "${scanner_bin}" "$@" > "${output_file}"

              echo "CSV written to ${output_file}"
              ls -lh "${output_file}"

              if [ "${HOLD_AFTER_SCAN:-true}" = "true" ]; then
                echo "Scanner finished. Pod is kept running for kubectl cp."
                echo "Copy with: kubectl -n ${POD_NAMESPACE} cp ${HOSTNAME}:${output_file} ./pvc-scan.csv -c scanner"
                tail -f /dev/null
              fi
          env:
            - name: TEMPLATE_INSTANCE
              value: CHANGE_ME
            - name: SCANNER_ARGS
              value: "--discover-orphans"
            - name: OUTPUT_FILE
              value: /scan-output/pvc-scan.csv
            - name: HOLD_AFTER_SCAN
              value: "true"
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: scan-output
              mountPath: /scan-output
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: scan-output
          emptyDir: {}
