apiVersion: v1
kind: ServiceAccount
metadata:
  name: check-legacy-sa-token
  namespace: check-legacy-sa-token
  labels:
    app.kubernetes.io/name: check-legacy-sa-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: check-legacy-sa-token
  labels:
    app.kubernetes.io/name: check-legacy-sa-token
rules:
  - apiGroups: [""]
    resources: ["pods", "secrets"]
    verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: check-legacy-sa-token
  labels:
    app.kubernetes.io/name: check-legacy-sa-token
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: check-legacy-sa-token
subjects:
  - kind: ServiceAccount
    name: check-legacy-sa-token
    namespace: check-legacy-sa-token
