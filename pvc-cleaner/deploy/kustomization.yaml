apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - rbac.yaml
  - job.yaml

configMapGenerator:
  - name: pvc-cleaner-targets
    namespace: pvc-cleaner
    files:
      - targets.csv=targets.example.csv

generatorOptions:
  disableNameSuffixHash: true
