apiVersion: batch/v1
kind: Job
metadata:
  name: pvc-cleaner
  namespace: pvc-cleaner
  labels:
    app.kubernetes.io/name: pvc-cleaner
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pvc-cleaner
    spec:
      serviceAccountName: pvc-cleaner
      restartPolicy: Never
      containers:
        - name: cleaner
          image: ghcr.io/dinoallo/pvc-cleaner:latest
          imagePullPolicy: IfNotPresent
          args:
            - --input
            - /input/targets.csv
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: targets
              mountPath: /input
              readOnly: true
      volumes:
        - name: targets
          configMap:
            name: pvc-cleaner-targets
