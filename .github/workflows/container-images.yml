name: container-images

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      image:
        description: Image to build and push
        required: false
        default: all
        type: choice
        options:
          - all
          - scan-token
          - check-legacy-sa-token
          - check-non-default-sa-token
          - check-kubeconfig-in-config
          - check-sa-token-ca-retirement
          - check-apiserver-access-candidates
          - template-pvc-scanner
          - orphaned-pvc-scanner

concurrency:
  group: container-images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect changed images
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      has_changes: ${{ steps.matrix.outputs.has_changes }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build image matrix
        id: matrix
        env:
          BEFORE_SHA: ${{ github.event.before }}
          REQUESTED_IMAGE: ${{ github.event.inputs.image || 'all' }}
        run: |
          set -euo pipefail

          images='[
            {"app_dir":"scan-token","image":"scan-token","dockerfile":"./Dockerfile"},
            {"app_dir":"check-legacy-sa-token","image":"check-legacy-sa-token","dockerfile":"./Dockerfile"},
            {"app_dir":"check-non-default-sa-token","image":"check-non-default-sa-token","dockerfile":"./Dockerfile"},
            {"app_dir":"check-kubeconfig-in-config","image":"check-kubeconfig-in-config","dockerfile":"./Dockerfile"},
            {"app_dir":"check-sa-token-ca-retirement","image":"check-sa-token-ca-retirement","dockerfile":"./Dockerfile"},
            {"app_dir":"check-apiserver-access-candidates","image":"check-apiserver-access-candidates","dockerfile":"./Dockerfile"},
            {"app_dir":"template-pvc-scanner","image":"template-pvc-scanner","dockerfile":"./template-pvc-scanner/Dockerfile"},
            {"app_dir":"orphaned-pvc-scanner","image":"orphaned-pvc-scanner","dockerfile":"./Dockerfile"}
          ]'

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            if [[ "${REQUESTED_IMAGE}" == "all" ]]; then
              selected="${images}"
            else
              selected="$(jq -c --arg image "${REQUESTED_IMAGE}" '[.[] | select(.image == $image)]' <<< "${images}")"
            fi
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            selected="${images}"
          else
            if [[ -z "${BEFORE_SHA}" || "${BEFORE_SHA}" =~ ^0+$ ]]; then
              changed_files="$(git ls-tree -r --name-only HEAD)"
            else
              changed_files="$(git diff --name-only "${BEFORE_SHA}" "${GITHUB_SHA}")"
            fi

            files_json="$(printf '%s\n' "${changed_files}" | jq -R -s -c 'split("\n") | map(select(length > 0))')"
            selected="$(jq -c --argjson files "${files_json}" '
              [.[] | . as $image |
                select(
                  ($files | any(. == $image.app_dir or startswith($image.app_dir + "/"))) or
                  ($image.dockerfile == "./Dockerfile" and ($files | any(. == "Dockerfile"))) or
                  ($files | any(. == ".dockerignore"))
                )
              ]
            ' <<< "${images}")"
          fi

          count="$(jq 'length' <<< "${selected}")"
          if [[ "${count}" -eq 0 ]]; then
            echo "No image changes detected."
            echo 'matrix={"include":[]}' >> "${GITHUB_OUTPUT}"
            echo "has_changes=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "Selected images:"
          jq -r '.[] | "- \(.image) from \(.app_dir)"' <<< "${selected}"
          echo "matrix={\"include\":$(jq -c . <<< "${selected}")}" >> "${GITHUB_OUTPUT}"
          echo "has_changes=true" >> "${GITHUB_OUTPUT}"

  build-and-push:
    name: Build and push (${{ matrix.image }})
    needs: changes
    if: needs.changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.changes.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image namespace
        id: image-namespace
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.image-namespace.outputs.owner }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          build-args: |
            APP_DIR=${{ matrix.app_dir }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
