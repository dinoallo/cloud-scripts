apiVersion: v1
kind: ServiceAccount
metadata:
  name: check-apiserver-access-candidates
  namespace: check-apiserver-access-candidates
  labels:
    app.kubernetes.io/name: check-apiserver-access-candidates
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: check-apiserver-access-candidates
  labels:
    app.kubernetes.io/name: check-apiserver-access-candidates
rules:
  - apiGroups: [""]
    resources: ["pods", "serviceaccounts", "configmaps", "secrets"]
    verbs: ["list"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["rolebindings", "clusterrolebindings"]
    verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: check-apiserver-access-candidates
  labels:
    app.kubernetes.io/name: check-apiserver-access-candidates
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: check-apiserver-access-candidates
subjects:
  - kind: ServiceAccount
    name: check-apiserver-access-candidates
    namespace: check-apiserver-access-candidates
