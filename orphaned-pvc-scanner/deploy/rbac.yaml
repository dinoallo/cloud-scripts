apiVersion: v1
kind: ServiceAccount
metadata:
  name: orphaned-pvc-scanner
  namespace: orphaned-pvc-scanner
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: orphaned-pvc-scanner
rules:
  - nonResourceURLs:
      - /api
      - /api/*
      - /apis
      - /apis/*
    verbs:
      - get
  - apiGroups:
      - ""
    resources:
      - persistentvolumeclaims
    verbs:
      - list
  - apiGroups:
      - ""
    resources:
      - persistentvolumes
    verbs:
      - get
  - apiGroups:
      - ""
    resources:
      - pods
      - replicationcontrollers
    verbs:
      - get
      - list
  - apiGroups:
      - apps
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs:
      - get
      - list
  - apiGroups:
      - batch
    resources:
      - jobs
      - cronjobs
    verbs:
      - get
      - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: orphaned-pvc-scanner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: orphaned-pvc-scanner
subjects:
  - kind: ServiceAccount
    name: orphaned-pvc-scanner
    namespace: orphaned-pvc-scanner
